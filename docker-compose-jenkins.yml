services:
  jenkins:
    image: jenkins/jenkins:2.555.1-lts
    container_name: jenkins
    restart: unless-stopped

    user: root

    ports:
      - "8082:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Permite Jenkins usar o Docker do host

    environment:
      TZ: America/Sao_Paulo

volumes:
  jenkins_home:
    external: true