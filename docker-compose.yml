services:
  tr-app:
    image: ${APP_IMAGE}
    container_name: ${APP_CONTAINER_NAME}
    hostname: ${APP_HOSTNAME}

    restart: unless-stopped

    ports:
      - "${APP_PORT}:8080"

    environment:
      TZ: ${TZ}
      APP_ENV: ${APP_ENV}

    networks:
      - app_net

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
      - /run:size=32m,noexec,nosuid,nodev

    read_only: true

    pids_limit: 200

    mem_limit: ${MEM_LIMIT}
    cpus: ${CPU_LIMIT}

    ulimits:
      nofile:
        soft: 4096
        hard: 8192

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE}
        max-file: "${LOG_MAX_FILE}"

networks:
  app_net:
    name: ${COMPOSE_PROJECT_NAME}_app_net
    driver: bridge
    internal: false